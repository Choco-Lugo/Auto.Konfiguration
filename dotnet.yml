name: .NET Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Code holen
      uses: actions/checkout@v3

    - name: .NET installieren
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Tests ausf³hren
      run: dotnet test --configuration Release --verbosity normal

    - name: Publish WPF App
      run: dotnet publish Auto.Konfiguration/Auto.Konfiguration.csproj -c Release -r win-x64 --self-contained true -o publish

    - name: Artefakt hochladen
      uses: actions/upload-artifact@v4
      with:
        name: CarConfiguratorApp
        path: publish